<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Euro Trip 2026 — Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f9f6f0;
      --surface: #ffffff;
      --border:  #e0d9ce;
      --accent:  #c0392b;
      --accent2: #e67e22;
      --text:    #2c2c2c;
      --muted:   #777;
      --radius:  10px;
      --shadow:  0 2px 20px rgba(0,0,0,.10);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header bar (matches site) ── */
    .header-bar {
      background: #2c2c2c;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
    }
    .header-bar span {
      color: rgba(255,255,255,.8);
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .02em;
    }

    /* ── Login card ── */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 48px);
      padding: 24px 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .card .emoji { font-size: 2.6rem; margin-bottom: 12px; }

    .card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card .subtitle {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .input-group {
      position: relative;
      margin-bottom: 14px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 11px 44px 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
      letter-spacing: .05em;
    }
    input:focus { border-color: var(--accent2); }

    .toggle-vis {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .toggle-vis:hover { color: var(--text); }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      letter-spacing: .02em;
    }
    .btn:hover:not(:disabled) { background: #a93226; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Messages ── */
    .msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .85rem;
      text-align: left;
      display: none;
    }
    .msg.error {
      background: #fdf0ef;
      border: 1px solid #f5c6c2;
      color: #922b21;
      display: block;
    }
    .msg.locked {
      background: #fdf3e3;
      border: 1px solid #f5cba7;
      color: #784212;
      display: block;
    }

    .attempts-left {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 10px;
    }
    .attempts-left.warn { color: #c0392b; font-weight: 600; }

    /* ── Shake animation on wrong password ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake .35s ease; }
  </style>
</head>
<body>

<div class="header-bar">
  <span>🇵🇹🇪🇸 Euro Trip 2026</span>
</div>

<div class="login-wrap">
  <div class="card" id="card">
    <div class="emoji">🗺️</div>
    <h1>Family Trip Planner</h1>
    <p class="subtitle">Enter the trip password to continue</p>

    <form id="login-form" autocomplete="off">
      <div class="input-group">
        <input
          type="password"
          id="pw-input"
          placeholder="Password"
          autocomplete="current-password"
          autofocus
        />
        <button type="button" class="toggle-vis" id="toggle-vis" title="Show/hide password">👁</button>
      </div>

      <button type="submit" class="btn" id="submit-btn">Enter</button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="attempts-left" id="attempts-display"></div>
  </div>
</div>

<script>
  // ── Config ───────────────────────────────────────────────────────────────
  const CORRECT_PW     = '2026trip';
  const MAX_ATTEMPTS   = 15;
  const LOCKOUT_MS     = 30 * 60 * 1000;   // 30 minutes
  const AUTH_KEY       = 'tripAuth2026';
  const ATTEMPTS_KEY   = 'tripAttempts';
  const LOCKOUT_KEY    = 'tripLockUntil';

  // ── Elements ─────────────────────────────────────────────────────────────
  const form        = document.getElementById('login-form');
  const pwInput     = document.getElementById('pw-input');
  const submitBtn   = document.getElementById('submit-btn');
  const msgEl       = document.getElementById('msg');
  const attemptsEl  = document.getElementById('attempts-display');
  const toggleBtn   = document.getElementById('toggle-vis');
  const card        = document.getElementById('card');

  // ── Helpers ──────────────────────────────────────────────────────────────
  function getAttempts()  { return parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0', 10); }
  function getLockUntil() { return parseInt(localStorage.getItem(LOCKOUT_KEY)  || '0', 10); }

  function isLocked() {
    const lockUntil = getLockUntil();
    if (lockUntil && Date.now() < lockUntil) return true;
    if (lockUntil && Date.now() >= lockUntil) {
      // Lockout expired — reset
      localStorage.removeItem(LOCKOUT_KEY);
      localStorage.removeItem(ATTEMPTS_KEY);
    }
    return false;
  }

  function remainingMins() {
    return Math.ceil((getLockUntil() - Date.now()) / 60000);
  }

  function showError(text) {
    msgEl.className = 'msg error';
    msgEl.textContent = text;
    card.classList.remove('shake');
    void card.offsetWidth; // reflow to restart animation
    card.classList.add('shake');
  }

  function showLocked() {
    msgEl.className = 'msg locked';
    msgEl.textContent = `Too many failed attempts. Try again in ${remainingMins()} minute${remainingMins() !== 1 ? 's' : ''}.`;
    submitBtn.disabled = true;
    pwInput.disabled = true;
    attemptsEl.textContent = '';
    // Refresh countdown every minute
    clearInterval(window._lockTimer);
    window._lockTimer = setInterval(() => {
      if (!isLocked()) {
        clearInterval(window._lockTimer);
        msgEl.className = 'msg';
        msgEl.style.display = 'none';
        submitBtn.disabled = false;
        pwInput.disabled = false;
        pwInput.focus();
        updateAttemptsDisplay();
      } else {
        msgEl.textContent = `Too many failed attempts. Try again in ${remainingMins()} minute${remainingMins() !== 1 ? 's' : ''}.`;
      }
    }, 10000);
  }

  function updateAttemptsDisplay() {
    if (isLocked()) { showLocked(); return; }
    const used = getAttempts();
    const left = MAX_ATTEMPTS - used;
    if (used === 0) {
      attemptsEl.textContent = '';
      attemptsEl.className = 'attempts-left';
    } else if (left <= 5) {
      attemptsEl.textContent = `${left} attempt${left !== 1 ? 's' : ''} remaining`;
      attemptsEl.className = 'attempts-left warn';
    } else {
      attemptsEl.textContent = `${left} attempt${left !== 1 ? 's' : ''} remaining`;
      attemptsEl.className = 'attempts-left';
    }
  }

  // ── Toggle show/hide password ─────────────────────────────────────────────
  toggleBtn.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    toggleBtn.textContent = isHidden ? '🙈' : '👁';
  });

  // ── Submit ────────────────────────────────────────────────────────────────
  form.addEventListener('submit', (e) => {
    e.preventDefault();

    if (isLocked()) { showLocked(); return; }

    const entered = pwInput.value;

    if (entered === CORRECT_PW) {
      // ✅ Correct
      localStorage.setItem(AUTH_KEY, 'ok');
      localStorage.removeItem(ATTEMPTS_KEY);
      localStorage.removeItem(LOCKOUT_KEY);
      submitBtn.textContent = '✓ Unlocking…';
      submitBtn.disabled = true;
      window.location.href = './index.html';
    } else {
      // ❌ Wrong
      const newCount = getAttempts() + 1;
      localStorage.setItem(ATTEMPTS_KEY, String(newCount));

      if (newCount >= MAX_ATTEMPTS) {
        localStorage.setItem(LOCKOUT_KEY, String(Date.now() + LOCKOUT_MS));
        showLocked();
      } else {
        const left = MAX_ATTEMPTS - newCount;
        showError(`Incorrect password. ${left} attempt${left !== 1 ? 's' : ''} remaining.`);
        updateAttemptsDisplay();
      }

      pwInput.value = '';
      pwInput.focus();
    }
  });

  // ── On load: check if already locked or already authed ───────────────────
  (function init() {
    // Already logged in → go straight to the trip
    if (localStorage.getItem(AUTH_KEY) === 'ok') {
      window.location.href = './index.html';
      return;
    }
    if (isLocked()) {
      showLocked();
    } else {
      updateAttemptsDisplay();
    }
  })();
</script>

</body>
</html>
