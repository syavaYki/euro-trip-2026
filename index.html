<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Euro Trip 2026 🇵🇹🇪🇸</title>

  <script>
    const RAW_BASE = "./";
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f9f6f0;
      --surface:   #ffffff;
      --border:    #e0d9ce;
      --accent:    #c0392b;       /* deep red — Portuguese/Spanish vibe */
      --accent2:   #e67e22;       /* warm orange */
      --text:      #2c2c2c;
      --muted:     #777;
      --tab-h:     48px;
      --subt-h:    40px;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

        /* ── City tab bar ── */
    #city-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      background: #2c2c2c;
      padding: 0 8px;
      gap: 2px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #city-tabs::-webkit-scrollbar { display: none; }
    .city-tab {
      flex-shrink: 0;
      padding: 0 16px;
      height: var(--tab-h);
      display: flex;
      align-items: center;
      cursor: pointer;
      color: rgba(255,255,255,.65);
      font-size: .85rem;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .city-tab:hover  { color: #fff; }
    .city-tab.active { color: #fff; border-bottom-color: var(--accent2); }
    .city-tab .flag  { margin-right: 6px; font-size: 1.1em; }

    /* ── Sub-tab bar (Food / Sights / Overview) ── */
    #sub-tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      gap: 4px;
    }
    .sub-tab {
      padding: 0 14px;
      height: var(--subt-h);
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .sub-tab:hover  { color: var(--text); }
    .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Content area ── */
    #content {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    /* ── Loading / error states ── */
    .loader {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .loader .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: .88rem;
      line-height: 1.5;
    }
    .error-box strong { color: #856404; }

    /* ── Markdown rendered content ── */
    .md h1 { font-size: 1.5rem; color: var(--accent); margin: 0 0 6px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
    .md h2 { font-size: 1.15rem; color: #444; margin: 28px 0 10px; display: flex; align-items: center; gap: 8px; }
    .md h3 { font-size: 1rem; color: #555; margin: 18px 0 6px; }
    .md p  { margin: 8px 0; }
    .md a  { color: var(--accent); }
    .md a:hover { text-decoration: underline; }
    .md ul, .md ol { padding-left: 20px; margin: 6px 0; }
    .md li { margin: 3px 0; }
    .md strong { color: #222; }
    .md em { color: var(--muted); font-style: normal; font-size: .9em; }
    .md blockquote {
      border-left: 3px solid var(--accent2);
      margin: 12px 0;
      padding: 8px 14px;
      background: #fff8f0;
      border-radius: 0 6px 6px 0;
      color: #7a5c30;
      font-size: .88rem;
    }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Tables ── */
    .md table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
      margin: 12px 0 20px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .md th {
      background: #f0ebe3;
      text-align: left;
      padding: 8px 10px;
      font-weight: 700;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #555;
      border-bottom: 1px solid var(--border);
    }
    .md td {
      padding: 8px 10px;
      border-bottom: 1px solid #f0ebe3;
      vertical-align: top;
    }
    .md tr:last-child td { border-bottom: none; }
    .md tr:hover td { background: #fdf9f5; }

    /* Mobile: make tables scroll horizontally */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -4px; }

    /* ── Overview two-column layout ── */
    #content.overview-active {
      max-width: 1180px;
      padding: 0;
    }
    .overview-layout {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 20px 16px 60px;
    }
    .overview-main { flex: 1; min-width: 0; }

    /* ── TOC sidebar ── */
    .toc-sidebar {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: calc(var(--tab-h) + 12px);
      max-height: calc(100vh - var(--tab-h) - 32px);
      overflow-y: auto;
      scrollbar-width: thin;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 0 12px;
      box-shadow: var(--shadow);
    }
    .toc-sidebar::-webkit-scrollbar { width: 4px; }
    .toc-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .toc-title {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      padding: 0 14px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .toc-group { display: flex; flex-direction: column; }
    .toc-city {
      display: block;
      padding: 5px 14px;
      font-size: .78rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      transition: color .12s;
      margin-top: 4px;
    }
    .toc-city:hover { color: var(--accent); }
    .toc-city.active { color: var(--accent); }
    .toc-day {
      display: block;
      padding: 3px 14px 3px 26px;
      font-size: .74rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .12s;
    }
    .toc-day:hover { color: var(--text); }
    .toc-day.active { color: var(--accent); font-weight: 600; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .toc-sidebar { display: none; }
      .overview-layout { padding: 14px 10px 60px; }
    }
    @media (max-width: 600px) {
      .city-tab  { padding: 0 12px; font-size: .8rem; }
      #content   { padding: 14px 10px 60px; }
      .md h1 { font-size: 1.25rem; }
      .md table { font-size: .75rem; }
      .md th, .md td { padding: 6px 8px; }
    }
  </style>
</head>
<body>

<!-- City tab bar -->
<div id="city-tabs">
  <div class="city-tab active" data-city="overview">
    <span class="flag">📋</span>Overview
  </div>
  <div class="city-tab" data-city="porto">
    <span class="flag">🇵🇹</span>Porto
  </div>
  <div class="city-tab" data-city="lisbon">
    <span class="flag">🇵🇹</span>Lisbon
  </div>
  <div class="city-tab" data-city="barcelona">
    <span class="flag">🇪🇸</span>Barcelona
  </div>
  <div class="city-tab" data-city="madrid">
    <span class="flag">🇪🇸</span>Madrid
  </div>
</div>

<!-- Sub-tab bar -->
<div id="sub-tabs"></div>

<!-- Main content -->
<div id="content">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    Loading…
  </div>
</div>

<script>
// ─── City → file map ─────────────────────────────────────────────────────────
const TABS = {
  overview: {
    label: "Overview",
    subs: [
      { key: "master",  label: "📋 Full Itinerary", file: "docs/instructions/euro_trip_2026.md" }
    ]
  },
  porto: {
    label: "Porto",
    subs: [
      { key: "food",   label: "🍽️ Food & Drink",  file: "docs/instructions/porto_food_research.md" },
      { key: "sights", label: "🏛️ Sights",         file: "docs/instructions/porto_sights_research.md" }
    ]
  },
  lisbon: {
    label: "Lisbon",
    subs: [
      { key: "food",   label: "🍽️ Food & Drink",  file: "docs/instructions/lisbon_food_research.md" },
      { key: "sights", label: "🏛️ Sights",         file: "docs/instructions/lisbon_sights_research.md" }
    ]
  },
  barcelona: {
    label: "Barcelona",
    subs: [
      { key: "food",   label: "🍽️ Food & Drink",  file: "docs/instructions/barcelona_food_research.md" },
      { key: "sights", label: "🏛️ Sights",         file: "docs/instructions/barcelona_sights_research.md" }
    ]
  },
  madrid: {
    label: "Madrid",
    subs: [
      { key: "food",   label: "🍽️ Food & Drink",  file: "docs/instructions/madrid_food_research.md" },
      { key: "sights", label: "🏛️ Sights",         file: "docs/instructions/madrid_sights_research.md" }
    ]
  }
};

// ─── State ───────────────────────────────────────────────────────────────────
let activeCity = "overview";
let activeSub  = "master";
const cache = {};       // file → rendered HTML
let tocObserver = null; // IntersectionObserver for TOC highlight

// ─── Elements ────────────────────────────────────────────────────────────────
const contentEl  = document.getElementById("content");
const loaderEl   = document.getElementById("loader");
const subTabsEl  = document.getElementById("sub-tabs");
const cityTabsEl = document.getElementById("city-tabs");

// ─── Render sub-tabs ─────────────────────────────────────────────────────────
function renderSubTabs(city) {
  const subs = TABS[city].subs;
  subTabsEl.innerHTML = subs.map(s =>
    `<div class="sub-tab ${s.key === activeSub ? 'active' : ''}" data-sub="${s.key}">${s.label}</div>`
  ).join("");
  subTabsEl.querySelectorAll(".sub-tab").forEach(el => {
    el.addEventListener("click", () => {
      activeSub = el.dataset.sub;
      subTabsEl.querySelectorAll(".sub-tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      loadContent(city, activeSub);
    });
  });
}

// ─── Fetch + render markdown ──────────────────────────────────────────────────
async function loadContent(city, sub) {
  const subCfg = TABS[city].subs.find(s => s.key === sub);
  if (!subCfg) return;

  // Tear down any previous TOC observer and layout
  if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
  contentEl.classList.remove('overview-active');

  // Show loader
  contentEl.innerHTML = `<div class="loader"><div class="spinner"></div>Loading ${subCfg.label}…</div>`;

  const isOverview = (city === 'overview' && sub === 'master');

  // Cache hit?
  if (cache[subCfg.file]) {
    contentEl.innerHTML = cache[subCfg.file];
    wrapTables();
    if (isOverview) injectTOC();
    return;
  }

  try {
    const url = RAW_BASE + subCfg.file;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} — file not found: ${subCfg.file}`);
    const md = await res.text();
    const html = `<div class="md">${marked.parse(md)}</div>`;
    cache[subCfg.file] = html;
    contentEl.innerHTML = html;
    wrapTables();
    if (isOverview) injectTOC();
  } catch (err) {
    contentEl.innerHTML = `
      <div class="error-box">
        <strong>⚠️ Could not load file</strong><br><br>
        ${err.message}<br><br>
        Make sure the file is committed to your GitHub repo and the <code>RAW_BASE</code>
        URL is configured correctly at the top of this file.
      </div>`;
  }
}

// ─── Assign slug IDs to headings ──────────────────────────────────────────────
function assignHeadingIds(container) {
  const seen = {};
  container.querySelectorAll('h1,h2,h3').forEach(h => {
    let base = h.textContent.trim()
      .toLowerCase()
      .replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '')
      .replace(/[^a-z0-9\s]/g, '')
      .trim()
      .replace(/\s+/g, '-');
    let id = base;
    let n = 2;
    while (seen[id]) { id = `${base}-${n++}`; }
    seen[id] = true;
    h.id = id;
  });
}

// ─── Build TOC nav element ────────────────────────────────────────────────────
function buildTOC(container) {
  const nav = document.createElement('nav');
  nav.className = 'toc-sidebar';
  nav.innerHTML = '<div class="toc-title">Contents</div>';

  let currentGroup = null;

  container.querySelectorAll('h2,h3').forEach(h => {
    if (h.tagName === 'H2') {
      // Strip leading emoji and trailing date suffix for a short label
      const label = h.textContent.trim()
        .replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}\s]+/gu, '')
        .replace(/\s*[—\-].*$/, '')
        .trim();

      currentGroup = document.createElement('div');
      currentGroup.className = 'toc-group';

      const a = document.createElement('a');
      a.href = `#${h.id}`;
      a.className = 'toc-city';
      a.dataset.id = h.id;
      a.textContent = label;
      a.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById(h.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      currentGroup.appendChild(a);
      nav.appendChild(currentGroup);
    } else if (h.tagName === 'H3' && currentGroup) {
      const text = h.textContent.trim();
      if (!text.startsWith('Day ')) return;

      const label = text.match(/^Day \d+/)?.[0] || text;

      const a = document.createElement('a');
      a.href = `#${h.id}`;
      a.className = 'toc-day';
      a.dataset.id = h.id;
      a.textContent = label;
      a.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById(h.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      currentGroup.appendChild(a);
    }
  });

  return nav;
}

// ─── Inject TOC into overview layout ─────────────────────────────────────────
function injectTOC() {
  const mdEl = contentEl.querySelector('.md');
  if (!mdEl) return;

  assignHeadingIds(mdEl);
  const toc = buildTOC(mdEl);

  contentEl.classList.add('overview-active');

  const layout = document.createElement('div');
  layout.className = 'overview-layout';

  const main = document.createElement('div');
  main.className = 'overview-main';
  main.appendChild(mdEl);

  layout.appendChild(main);
  layout.appendChild(toc);
  contentEl.appendChild(layout);

  // Highlight active TOC link on scroll
  const allLinks = toc.querySelectorAll('[data-id]');
  const idToLink = {};
  allLinks.forEach(a => { idToLink[a.dataset.id] = a; });

  tocObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        allLinks.forEach(a => a.classList.remove('active'));
        const link = idToLink[entry.target.id];
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-8% 0px -82% 0px', threshold: 0 });

  Object.keys(idToLink).forEach(id => {
    const el = document.getElementById(id);
    if (el) tocObserver.observe(el);
  });
}

// ─── Wrap tables for horizontal scroll on mobile ──────────────────────────────
function wrapTables() {
  contentEl.querySelectorAll("table").forEach(t => {
    if (!t.parentElement.classList.contains("table-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      t.parentNode.insertBefore(wrap, t);
      wrap.appendChild(t);
    }
  });
}

// ─── City tab click ───────────────────────────────────────────────────────────
cityTabsEl.querySelectorAll(".city-tab").forEach(el => {
  el.addEventListener("click", () => {
    activeCity = el.dataset.city;
    activeSub  = TABS[activeCity].subs[0].key;

    cityTabsEl.querySelectorAll(".city-tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");

    renderSubTabs(activeCity);
    loadContent(activeCity, activeSub);
  });
});

// ─── Initial load ─────────────────────────────────────────────────────────────
renderSubTabs(activeCity);
loadContent(activeCity, activeSub);
</script>

</body>
</html>
